services:
  db-backup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: postgres-ride-backup          # antes: postgres-user-backup
    environment:
      - DB_HOST=postgres-ride                     # antes: postgres-user
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-raijmobi_ride_db}      # antes: raijmobi_user_db
      - DB_USER=${DB_USER:-raijmobi_ride}         # antes: raijmobi_user
      - DB_PASSWORD=${DB_PASSWORD:-raijmobi_pass} # mantido
      - BACKUP_DIR=/backups
      - BACKUP_INTERVAL_SECONDS=86400
      - TZ=America/Sao_Paulo
    volumes:
      - backup_data:/backups
    networks:
      - raijmobi-network

volumes:
  backup_data:

networks:
  raijmobi-network:
    external: true