services:
  db-backup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: postgres-user-backup
    environment:
      - DB_HOST=postgres-user
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-raijmobi_user_db}
      - DB_USER=${DB_USER:-raijmobi_user}
      - DB_PASSWORD=${DB_PASSWORD:-raijmobi_pass}
      - BACKUP_DIR=/backups
      - BACKUP_INTERVAL_SECONDS=86400   # a cada 24h
      - TZ=America/Sao_Paulo
    volumes:
      - backup_data:/backups             # volume nomeado para persistência dos backups
      # Alternativa: mapear para uma pasta local no host
      # - ./backups:/backups
    networks:
      - raijmobi-network

volumes:
  backup_data:

networks:
  raijmobi-network:
    external: true